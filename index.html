<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Editor Lev | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
        <!-- Пустой блок сверху для баланса центровки -->
        <div class="hero-spacer-top"></div>

        <div class="hero-content">
            <h1>
                <span class="gradient-text-video">VIDEO</span>
                <span class="gradient-text-editor">EDITOR</span>
            </h1>
            <p class="tagline">Create vertical high-quality stories</p>
            
            <div class="social-links">
                <a href="https://t.me/editor_lev" target="_blank"><i class="fab fa-telegram-plane"></i></a>
                <a href="javascript:void(0)" onclick="copyEmail()" class="email-btn">
                    <i class="fas fa-envelope"></i>
                    <span class="copy-tooltip" id="tooltip">Copy Email</span>
                </a>
            </div>

            <div class="action-group">
                <a href="https://t.me/editor_lev" target="_blank" class="btn-hire">Hire me</a>
            </div>
        </div>
        
        <div class="scroll-down-container">
            <a href="#portfolio" class="scroll-btn"><i class="fas fa-chevron-down"></i></a>
        </div>
    </section>

    <section class="portfolio" id="portfolio">
        <div class="portfolio-wrapper">
            <h2 class="section-title">MY WORKS</h2>
            <div class="work-grid">
                <!-- Карточки видео -->
                <div class="work-card">
                    <video class="portfolio-video" muted loop playsinline>
                        <source src="video1.mp4" type="video/mp4">
                    </video>
                    <div class="video-controls">
                        <button class="mute-btn"><i class="fas fa-volume-mute"></i></button>
                        <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="0.3">
                    </div>
                </div>
                <div class="work-card">
                    <video class="portfolio-video" muted loop playsinline>
                        <source src="video2.mp4" type="video/mp4">
                    </video>
                    <div class="video-controls">
                        <button class="mute-btn"><i class="fas fa-volume-mute"></i></button>
                        <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="0.3">
                    </div>
                </div>
                <div class="work-card">
                    <video class="portfolio-video" muted loop playsinline>
                        <source src="video3.mp4" type="video/mp4">
                    </video>
                    <div class="video-controls">
                        <button class="mute-btn"><i class="fas fa-volume-mute"></i></button>
                        <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="0.3">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function copyEmail() {
            const email = "editorafterwork@gmail.com";
            const tooltip = document.getElementById("tooltip");
            const showSuccess = () => {
                tooltip.innerText = "Copied!";
                tooltip.classList.add('copied-active');
                setTimeout(() => {
                    tooltip.classList.remove('copied-active');
                    setTimeout(() => { if(!tooltip.classList.contains('copied-active')) tooltip.innerText = "Copy Email"; }, 300);
                }, 2000);
            };
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(email).then(showSuccess);
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = email;
                textArea.style.position = "fixed"; textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus(); textArea.select();
                try { document.execCommand('copy'); showSuccess(); } catch (err) { console.error(err); }
                document.body.removeChild(textArea);
            }
        }

        document.querySelectorAll('.work-card').forEach(card => {
            const video = card.querySelector('video');
            const muteBtn = card.querySelector('.mute-btn');
            const slider = card.querySelector('.volume-slider');
            const icon = muteBtn.querySelector('i');
            const controls = card.querySelector('.video-controls');
            video.volume = 0.3;
            muteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                video.muted = !video.muted;
                if (video.muted) {
                    controls.classList.remove('sound-active');
                    icon.className = 'fas fa-volume-mute';
                } else {
                    controls.classList.add('sound-active');
                    icon.className = 'fas fa-volume-up';
                    if (video.volume < 0.1) { video.volume = 0.3; slider.value = 0.3; }
                }
            });
            slider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                video.volume = val;
                video.muted = (val === 0);
                if (!video.muted) {
                    controls.classList.add('sound-active');
                    icon.className = 'fas fa-volume-up';
                } else {
                    icon.className = 'fas fa-volume-mute';
                }
            });
            slider.addEventListener('click', (e) => e.stopPropagation());
            card.addEventListener('mouseenter', () => video.play());
            card.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; });
        });
    </script>
</body>
</html>
