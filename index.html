<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Lev | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* --- СТИЛИ (CSS) --- */
        html {
            scroll-behavior: smooth;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            background-color: #0a0005; /* Цвет-заглушка */
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Оптимизированный фон для мобильных */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.9) 100%),
                linear-gradient(to bottom, rgba(20, 0, 10, 0.4), rgba(0, 0, 0, 0.8)),
                url('https://wallpapers.com/images/hd/red-moon-night-sky-jey5ix1d1m74bsxz.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1; /* Фон всегда сзади */
        }

        .hero {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        h1 {
            font-size: clamp(3rem, 12vw, 9rem);
            font-weight: 900;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .gradient-text-video, .gradient-text-editor {
            display: block;
            background: linear-gradient(180deg, #ff3366 30%, #66001a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: clamp(1rem, 4vw, 1.6rem); 
            font-weight: 500;
            color: #ffffff;
            margin-top: 20px;
            letter-spacing: 0.5px;
            padding: 0 10px;
        }

        .social-links {
            display: flex;
            gap: 15px;
            margin-top: 35px;
        }

        .social-links a {
            position: relative;
            color: #ff3366;
            width: clamp(50px, 12vw, 70px); 
            height: clamp(50px, 12vw, 70px); 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 5vw, 2.2rem); 
            border: 1px solid rgba(255, 51, 102, 0.4);
            border-radius: 50%;
            text-decoration: none;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.3);
        }

        .social-links a:hover {
            color: #ffffff;
            background: #ff3366;
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.6);
            transform: translateY(-3px);
        }

        .copy-tooltip {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff3366;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .social-links a:hover .copy-tooltip {
            opacity: 1;
            visibility: visible;
        }

        .copy-tooltip.show {
            opacity: 1;
            visibility: visible;
            background: #4caf50;
        }

        .action-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
        }

        .btn-hire {
            padding: 15px 50px;
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
            border: 2px solid #ff3366;
            border-radius: 50px;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            background: rgba(255, 51, 102, 0.1);
        }

        .btn-hire:hover {
            background: #ff3366;
            box-shadow: 0 5px 20px rgba(255, 51, 102, 0.4);
        }

        .scroll-btn {
            color: #ff3366;
            font-size: 2rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(10px);}
            60% {transform: translateY(5px);}
        }

        /* ПОРТФОЛИО */
        .portfolio {
            width: 100%;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
        }

        .portfolio-wrapper {
            width: 100%;
            max-width: 1100px;
            text-align: center;
        }

        .section-title {
            font-size: clamp(2rem, 8vw, 3rem);
            margin-bottom: 40px; 
            letter-spacing: 3px;
            background: linear-gradient(180deg, #ff3366 30%, #66001a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .work-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px;
        }

        .work-card {
            position: relative;
            aspect-ratio: 9 / 16;
            background: #000;
            border: 1px solid rgba(255, 51, 102, 0.2);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s ease;
        }

        .work-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
            transition: 0.4s ease;
        }

        .work-card:hover {
            transform: translateY(-8px);
            border-color: #ff3366;
        }

        .work-card:hover video {
            opacity: 1;
        }

        /* БЛОК ГРОМКОСТИ */
        .volume-control {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 51, 102, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            transition: 0.3s ease;
            z-index: 10;
        }

        /* На мобильных устройствах контроллеры звука видны сразу */
        @media (max-width: 850px) {
            .work-grid { 
                grid-template-columns: 1fr; 
                max-width: 300px; 
                margin: 0 auto;
            }
            .volume-control {
                opacity: 1;
            }
            .work-card video {
                opacity: 1;
            }
        }

        .work-card:hover .volume-control {
            opacity: 1;
        }

        .mute-btn {
            background: none;
            border: none;
            color: #ff3366;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 50px;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff3366;
            cursor: pointer;
        }

        footer {
            padding: 40px;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>
                <span class="gradient-text-video">VIDEO</span>
                <span class="gradient-text-editor">EDITOR</span>
            </h1>
            <p class="tagline">Create vertical high-quality stories</p>
            
            <div class="social-links">
                <a href="https://t.me/editor_lev" target="_blank"><i class="fab fa-telegram-plane"></i></a>
                <a href="javascript:void(0)" onclick="copyEmail()" id="email-btn">
                    <i class="fas fa-envelope"></i>
                    <span class="copy-tooltip" id="tooltip">Copy Email</span>
                </a>
            </div>

            <div class="action-group">
                <a href="https://t.me/editor_lev" target="_blank" class="btn-hire">Hire me</a>
                <a href="#portfolio" class="scroll-btn"><i class="fas fa-chevron-down"></i></a>
            </div>
        </div>
    </section>

    <section class="portfolio" id="portfolio">
        <div class="portfolio-wrapper">
            <h2 class="section-title">MY WORK</h2>
            <div class="work-grid">
                <div class="work-card">
                    <video class="portfolio-video" muted loop playsinline>
                        <source src="video1.mp4" type="video/mp4">
                    </video>
                    <div class="volume-control">
                        <button class="mute-btn"><i class="fas fa-volume-mute"></i></button>
                        <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="0.3">
                    </div>
                </div>
                <div class="work-card">
                    <video class="portfolio-video" muted loop playsinline>
                        <source src="video2.mp4" type="video/mp4">
                    </video>
                    <div class="volume-control">
                        <button class="mute-btn"><i class="fas fa-volume-mute"></i></button>
                        <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="0.3">
                    </div>
                </div>
                <div class="work-card">
                    <video class="portfolio-video" muted loop playsinline>
                        <source src="video3.mp4" type="video/mp4">
                    </video>
                    <div class="volume-control">
                        <button class="mute-btn"><i class="fas fa-volume-mute"></i></button>
                        <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="0.3">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 @editor_lev</p>
    </footer>

    <script>
        // Копирование почты
        function copyEmail() {
            const email = "editorafterwork@gmail.com";
            const tooltip = document.getElementById("tooltip");
            navigator.clipboard.writeText(email).then(() => {
                tooltip.innerText = "Copied!";
                tooltip.classList.add("show");
                setTimeout(() => {
                    tooltip.innerText = "Copy Email";
                    tooltip.classList.remove("show");
                }, 2000);
            });
        }

        // Работа с видео
        const cards = document.querySelectorAll('.work-card');
        
        // Проверяем, мобильное ли устройство
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        cards.forEach(card => {
            const video = card.querySelector('video');
            const muteBtn = card.querySelector('.mute-btn');
            const muteIcon = muteBtn.querySelector('i');
            const slider = card.querySelector('.volume-slider');

            video.volume = 0.3;

            if (!isMobile) {
                // Логика для ПК (наведение)
                card.addEventListener('mouseenter', () => video.play());
                card.addEventListener('mouseleave', () => {
                    video.pause();
                    video.currentTime = 0;
                    video.muted = true;
                    updateIcon(true);
                });
            } else {
                // Логика для мобильных (запуск при появлении на экране)
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            video.play().catch(() => {});
                        } else {
                            video.pause();
                        }
                    });
                }, { threshold: 0.6 });
                observer.observe(video);
                
                // Также можно кликнуть, чтобы запустить/остановить
                card.addEventListener('click', () => {
                    if (video.paused) video.play();
                    else video.pause();
                });
            }

            muteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                video.muted = !video.muted;
                updateIcon(video.muted);
            });

            slider.addEventListener('input', (e) => {
                e.stopPropagation();
                video.volume = e.target.value;
                video.muted = (video.volume === 0);
                updateIcon(video.muted);
            });

            function updateIcon(isMuted) {
                if (isMuted || video.volume === 0) {
                    muteIcon.className = 'fas fa-volume-mute';
                } else if (video.volume < 0.5) {
                    muteIcon.className = 'fas fa-volume-down';
                } else {
                    muteIcon.className = 'fas fa-volume-up';
                }
            }
        });
    </script>
</body>
</html>
