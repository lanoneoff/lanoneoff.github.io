<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Editor Lev | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>
                <span class="gradient-text-video">VIDEO</span>
                <span class="gradient-text-editor">EDITOR</span>
            </h1>
            <p class="tagline">Create vertical high-quality stories</p>
            
            <div class="social-links">
                <a href="https://t.me/editor_lev" target="_blank"><i class="fab fa-telegram-plane"></i></a>
                <a href="javascript:void(0)" onclick="copyEmail()" id="email-btn">
                    <i class="fas fa-envelope"></i>
                    <span class="copy-tooltip" id="tooltip">Copy Email</span>
                </a>
            </div>

            <div class="action-group">
                <a href="https://t.me/editor_lev" target="_blank" class="btn-hire">Hire me</a>
                <a href="#portfolio" class="scroll-btn"><i class="fas fa-chevron-down"></i></a>
            </div>
        </div>
    </section>

    <section class="portfolio" id="portfolio">
        <div class="portfolio-wrapper">
            <h2 class="section-title">MY WORK</h2>
            <div class="work-grid">
                <div class="work-card">
                    <video class="portfolio-video" muted loop playsinline preload="metadata">
                        <source src="video1.mp4" type="video/mp4">
                    </video>
                    <div class="volume-control">
                        <button class="mute-btn"><i class="fas fa-volume-mute"></i></button>
                        <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="0.3">
                    </div>
                </div>
                <div class="work-card">
                    <video class="portfolio-video" muted loop playsinline preload="metadata">
                        <source src="video2.mp4" type="video/mp4">
                    </video>
                    <div class="volume-control">
                        <button class="mute-btn"><i class="fas fa-volume-mute"></i></button>
                        <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="0.3">
                    </div>
                </div>
                <div class="work-card">
                    <video class="portfolio-video" muted loop playsinline preload="metadata">
                        <source src="video3.mp4" type="video/mp4">
                    </video>
                    <div class="volume-control">
                        <button class="mute-btn"><i class="fas fa-volume-mute"></i></button>
                        <input type="range" class="volume-slider" min="0" max="1" step="0.05" value="0.3">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 @editor_lev</p>
    </footer>

    <script>
        function copyEmail() {
            const email = "editorafterwork@gmail.com";
            const tooltip = document.getElementById("tooltip");
            navigator.clipboard.writeText(email).then(() => {
                tooltip.innerText = "Copied!";
                tooltip.classList.add("show");
                setTimeout(() => {
                    tooltip.innerText = "Copy Email";
                    tooltip.classList.remove("show");
                }, 2000);
            });
        }

        const cards = document.querySelectorAll('.work-card');
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        cards.forEach(card => {
            const video = card.querySelector('video');
            const muteBtn = card.querySelector('.mute-btn');
            const muteIcon = muteBtn.querySelector('i');
            const slider = card.querySelector('.volume-slider');

            video.volume = 0.3;

            if (!isMobile) {
                card.addEventListener('mouseenter', () => video.play());
                card.addEventListener('mouseleave', () => {
                    video.pause();
                    video.currentTime = 0;
                });
            } else {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            video.play().catch(() => {});
                        } else {
                            video.pause();
                        }
                    });
                }, { threshold: 0.5 });
                observer.observe(video);
            }

            muteBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                video.muted = !video.muted;
                updateIcon(video.muted);
            });

            slider.addEventListener('input', (e) => {
                e.stopPropagation();
                video.volume = e.target.value;
                video.muted = (video.volume === 0);
                updateIcon(video.muted);
            });

            function updateIcon(isMuted) {
                if (isMuted || video.volume === 0) {
                    muteIcon.className = 'fas fa-volume-mute';
                } else if (video.volume < 0.5) {
                    muteIcon.className = 'fas fa-volume-down';
                } else {
                    muteIcon.className = 'fas fa-volume-up';
                }
            }
        });
    </script>
</body>
</html>
