<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Lev | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>
                <span class="gradient-text-video">VIDEO</span>
                <span class="gradient-text-editor">EDITOR</span>
            </h1>
            <p class="tagline">Create vertical high-quality stories</p>
            
            <div class="social-links">
                <a href="https://t.me/editor_lev" target="_blank"><i class="fab fa-telegram-plane"></i></a>
                
                <a href="javascript:void(0)" onclick="copyEmail()" id="email-btn" title="Click to copy email">
                    <i class="fas fa-envelope"></i>
                    <span class="copy-tooltip" id="tooltip">Copy Email</span>
                </a>
            </div>

            <div class="action-group">
                <a href="https://t.me/editor_lev" target="_blank" class="btn-hire">Hire me</a>
                <a href="#portfolio" class="scroll-btn"><i class="fas fa-chevron-down"></i></a>
            </div>
        </div>
    </section>

    <section class="portfolio" id="portfolio">
        <div class="portfolio-wrapper">
            <h2 class="section-title">MY WORK</h2>
            <div class="work-grid">
                <div class="work-card">
                    <video class="portfolio-video" muted loop playsinline>
                        <source src="video1.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="work-card">
                    <video class="portfolio-video" muted loop playsinline>
                        <source src="video2.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="work-card">
                    <video class="portfolio-video" muted loop playsinline>
                        <source src="video3.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 @editor_lev</p>
    </footer>

    <script>
        // Функция для копирования почты
        function copyEmail() {
            const email = "editorafterwork@gmail.com";
            const tooltip = document.getElementById("tooltip");
            
            navigator.clipboard.writeText(email).then(() => {
                tooltip.innerText = "Copied!";
                tooltip.classList.add("show");
                
                // Возвращаем текст обратно через 2 секунды
                setTimeout(() => {
                    tooltip.innerText = "Copy Email";
                    tooltip.classList.remove("show");
                }, 2000);
            });
        }

        // Логика видео при наведении
        const cards = document.querySelectorAll('.work-card');
        cards.forEach(card => {
            const video = card.querySelector('video');
            card.addEventListener('mouseenter', () => {
                video.play().catch(e => console.log("Play error:", e));
            });
            card.addEventListener('mouseleave', () => {
                video.pause();
                video.currentTime = 0;
            });
        });
    </script>
</body>
</html>
